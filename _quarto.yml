project:
  type: website
  output-dir: docs
  # Run every code chunk from the project root so paths like
  # "data/cleaned/lakers_shots.rds" work the same in the rendered site
  # as they do when you type them into the RStudio console.
  execute-dir: project
  resources:
    - assets/*
  render:
    - 00-index.qmd
    - slides/w7-slides-lecture.qmd
    - slides/w8-slides-lecture.qmd
    - slides/w9-slides-lecture.qmd
    - slides/w10-slides-lecture.qmd
    - workbooks/01-setup.qmd
    - workbooks/02-api.qmd
    - workbooks/03-shiny1.qmd
    - workbooks/04-shiny2.qmd
    - workbooks/05-portfolio.qmd
    - workbooks/06-football-data.qmd
    - workbooks/07-claude-code.qmd
    - workbooks/08-quarto-pdf.qmd

lang: en

execute:
  freeze: false
  cache: false

format:
  html:
      theme:
        light: 
          - flatly
          - scss/custom.scss
        dark:
          - darkly
          - scss/custom.scss
      css: assets/styles.css
      callout-appearance: simple
      toc: true
      toc-depth: 4
      smooth-scroll: true
      highlight-style: atom-one
      number-sections: true
      number-depth: 4
      pagetitle: "{{< var meta.title >}}"

website:
  repo-url: https://github.com/shunyakmr/ULMS744-2025
  repo-actions: [issue]
  page-navigation: true
  page-footer:
    center: "Footer. Available under [CC BY-SA 4.0](https://creativecommons.org/licenses/by-sa/4.0/)."
  search:
    location: sidebar
    type: overlay
  sidebar:
    style: floating
    collapse-level: 2
    logo: assets/ULMS744-logo.svg
    tools:
      - icon: github
        href: https://github.com/shunyakmr/ULMS744-2025
    contents:
      - section: "Module Overview"
        contents:
          text: "Welcome"
          file: 00-index.qmd
      - section: "Reproducible Workflows for Sports Analytics"
        contents:
        - workbooks/01-setup.qmd
        - workbooks/02-api.qmd
        - workbooks/03-shiny1.qmd
        - workbooks/04-shiny2.qmd
        - workbooks/05-portfolio.qmd
      - section: "Extra Resources"
        contents:
        - workbooks/06-football-data.qmd
        - workbooks/07-claude-code.qmd
        - workbooks/08-quarto-pdf.qmd
  
editor: visual
